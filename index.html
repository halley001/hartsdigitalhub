<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Harts Digital Hub</title>
  <meta name="description" content="Chat with our AI assistant about digital packages, pricing, and free AI training for businesses in Cameroon. Direct WhatsApp handoff.">
  <meta property="og:title" content="Harts Digital Hub">
  <meta property="og:description" content="Chat with our AI assistant about digital packages and free AI training.">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://hartsdigitalhub.com/">

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700&family=DM+Mono:ital,wght@0,300;0,400;0,500;1,400&display=swap" rel="stylesheet">

  <!-- Styles -->
  <link rel="stylesheet" href="style.css">

  <!-- JSON-LD Schema -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "LocalBusiness",
    "name": "Harts Digital Hub",
    "url": "https://hartsdigitalhub.com/",
    "logo": "https://hartsdigitalhub.com/logo.png",
    "image": "https://hartsdigitalhub.com/og-image.jpg",
    "description": "Affordable digital marketing, website design, and social media management packages for SMEs in Cameroon.",
    "address": {
      "@type": "PostalAddress",
      "addressCountry": "CM"
    },
    "contactPoint": {
      "@type": "ContactPoint",
      "telephone": "+237622341343",
      "contactType": "customer support"
    }
  }
  </script>
</head>
<body>

  <!-- Ultra-minimal chat interface -->
  <div class="gemini-chat" id="chat-main">
    <!-- Only the message on first load -->
    <div class="chat-welcome" id="chat-welcome">
      <div class="welcome-inner">
        <h1>How can we help grow your business digitally?</h1>
      </div>
    </div>

    <div class="chat-messages" id="chat-messages" role="log" aria-live="polite"></div>

    <!-- The chat bar -->
    <div class="input-container">
      <form id="chat-form" class="gemini-input" autocomplete="off">
        <input 
          id="chat-input" 
          type="text" 
          placeholder="Type your message..." 
          aria-label="Type your message" 
          maxlength="600" 
        />
        <button id="chat-send" type="submit" class="send-btn" aria-label="Send">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M5 12h14M12 5l7 7-7 7" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </button>
      </form>
    </div>
  </div>

  <!-- App script -->
  <script src="app.js"></script>

</body>
</html>
